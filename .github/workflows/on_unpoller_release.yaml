name: OnUnpollerRelease
on:
  workflow_dispatch:
    inputs:
      unpoller_version:
        description: 'Version of unpoller released'
        required: true
        type: string

jobs:
  release:
    # depending on default permission settings for your org (contents being read-only or read-write for workloads), you will have to add permissions
    # see: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: yq - portable yaml processor
        uses: mikefarah/yq@v4.43.1

      - name: Update helm values
        run: |
          UNPOLLER_VERSION=${{ github.event.inputs.unpoller_version }}

          # Read current chart version and increment minor version
          CURRENT_VERSION=$(yq '.version' charts/unpoller/Chart.yaml | tr -d '"')

          # Remove 'v' prefix if present and split into components
          CURRENT_VERSION=${CURRENT_VERSION#v}
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)

          # Increment minor version, reset patch to 0
          NEW_MINOR=$((MINOR + 1))
          CHART_VERSION="${MAJOR}.${NEW_MINOR}.0"

          echo "Current chart version: ${CURRENT_VERSION}"
          echo "New chart version: ${CHART_VERSION}"
          echo "Setting appVersion to: ${UNPOLLER_VERSION}"

          yq -i ".appVersion=\"${UNPOLLER_VERSION}\"" charts/unpoller/Chart.yaml
          yq -i ".version=\"${CHART_VERSION}\"" charts/unpoller/Chart.yaml
          make helm-docs

          cp charts/unpoller/README.md README.MD
          git add charts
          git add README.MD
          git commit -m "chore(unpoller): Update to chart ${CHART_VERSION} with app version ${UNPOLLER_VERSION}"
          git push

      - name: Install Helm
        uses: azure/setup-helm@v4
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          config: .github/cr.yaml
